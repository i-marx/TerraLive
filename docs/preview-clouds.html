<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Drifting Clouds — Live</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}
  canvas{display:block;width:100vw !important;height:100vh !important}
  *{user-select:none;-webkit-user-select:none;touch-action:none;cursor:default}
  #err{position:fixed;inset:0;display:none;color:#889;font:14px system-ui;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="err">WebGL is not available on this device.</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* ============================================================
   DRIFTING CLOUDS v3 — ultra-real 24-hour sky
   - Three cloud genera: compact cauliflower CUMULUS with bright
     tops, shaded bases and sun-side silver linings; a thin high
     STRATUS veil; and an occasional heavy grey NIMBOSTRATUS deck.
   - True drift pace: fair-weather cumulus (~1.5 km, ~40 km/h)
     crosses the view in ~4 min; higher layers slower (parallax).
     Drift phase runs off the wall clock.
   - Real 24-h cycle from solar elevation (clock + date):
     deep-blue summer day, golden-hour blush, and honest night —
     near-black clouds silhouetted against sharp stars, with a
     glowing moon that becomes the light source for cloud rims.
   ============================================================ */

const CFG = {
  latitude    : 54.7,     // sun height (default: Lithuania)
  screenCross : 240,      // seconds for a near cloud to cross the screen
  renderScale : 0.8,      // internal resolution (raise to 1.0 on strong GPUs)
  maxDPR      : 2.0,
  cover       : 0.56      // cumulus cloudiness
};

let renderer;
try{
  renderer = new THREE.WebGLRenderer({ antialias:false, alpha:false, powerPreference:'low-power' });
}catch(e){ document.getElementById('err').style.display='flex'; throw e; }
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const uniforms = {
  uRes    : { value: new THREE.Vector2(1,1) },
  uOff    : { value: 0 },
  uWob    : { value: 0 },
  uSunEl  : { value: 30 },
  uSunPos : { value: new THREE.Vector2(0.5,0.3) },
  uMoonPos: { value: new THREE.Vector2(0.62,0.6) },
  uCover  : { value: CFG.cover }
};

const frag = `
precision highp float;
uniform vec2 uRes; uniform float uOff; uniform float uWob;
uniform float uSunEl; uniform vec2 uSunPos; uniform vec2 uMoonPos;
uniform float uCover;

float hash21(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  float a = hash21(i), b = hash21(i+vec2(1,0)), c = hash21(i+vec2(0,1)), d = hash21(i+vec2(1,1));
  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
}
float fbm4(vec2 p){
  float v = 0.0, a = 0.5;
  for(int i=0;i<4;i++){ v += a*vnoise(p); p = p*2.13 + vec2(19.7, 7.3); a *= 0.52; }
  return v;
}
float fbm3(vec2 p){
  float v = 0.0, a = 0.5;
  for(int i=0;i<3;i++){ v += a*vnoise(p); p = p*2.13 + vec2(19.7, 7.3); a *= 0.52; }
  return v;
}
vec3 aces(vec3 x){ return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0); }

/* compact cauliflower cumulus */
float cumulus(vec2 uv, float scale, float off, float cover, float wob){
  vec2 p = (uv + vec2(off, 0.0)) * scale;
  vec2 w = vec2(fbm4(p*0.7 + wob), fbm4(p*0.8 + 37.0));
  float big = fbm3(p*0.5 + 11.0);
  float mask = smoothstep(cover - 0.02, cover + 0.10, big);
  float d = fbm4(p + (w - 0.5)*0.8);
  d += 0.09 * fbm3(p*3.3 + w*2.0);
  d += 0.04 * fbm3(p*7.9);
  float t = smoothstep(cover - 0.02, cover + 0.09, d);
  return clamp(t*mask*2.1, 0.0, 1.0) + t*0.07*(1.0 - mask);
}
/* cauliflower interior lighting: lumpy self-shading across a mass */
float lumps(vec2 uv, float scale, float off){
  return fbm3(vec2((uv.x + off)*scale*2.6 + 5.0, uv.y*scale*2.6 + 5.0));
}

void main(){
  vec2 f2 = gl_FragCoord.xy / uRes;
  vec2 uv = vec2(f2.x * uRes.x/uRes.y, f2.y);
  float el = uSunEl;

  float dayF  = smoothstep(-8.0, 10.0, el);
  float glowF = exp(-abs(el)/9.0) * clamp((el + 9.0)/8.0, 0.0, 1.0);
  vec3 dayZen  = vec3(0.10, 0.35, 0.86);
  vec3 dayHor  = vec3(0.55, 0.76, 0.95);
  vec3 nightZen= vec3(0.004, 0.007, 0.022);
  vec3 nightHor= vec3(0.012, 0.020, 0.050);
  float h = pow(clamp(f2.y, 0.0, 1.0), 0.65);
  vec3 sky = mix( mix(nightHor, nightZen, h), mix(dayHor, dayZen, h), dayF );
  vec3 warm = vec3(1.0, 0.535, 0.275);
  sky += warm * glowF * pow(1.0 - h, 2.5) * 0.55;

  vec2 sunP = vec2(uSunPos.x * uRes.x/uRes.y, uSunPos.y);
  float sd = length(uv - sunP);
  /* no visible sun disc — just a whisper of directional light */
  if(el > -6.0){
    vec3 sunCol = mix(vec3(1.0,0.55,0.25), vec3(1.0,0.97,0.88), smoothstep(0.0, 25.0, el));
    sky += sunCol * 0.05 * exp(-sd*2.2);
  }

  /* sharp stars at night */
  float starF = smoothstep(-4.0, -12.0, el);
  if(starF > 0.0){
    vec2 g = uv * 190.0;
    vec2 id = floor(g), ff = fract(g);
    float hh = hash21(id);
    if(hh > 0.90){
      vec2 sp = vec2(hash21(id+3.1), hash21(id+7.7))*0.7 + 0.15;
      float dst = length(ff - sp);
      float m = (hh-0.90)/0.10;
      float tw = 0.8 + 0.2*sin(uWob*45.0 + hh*90.0);
      sky += vec3(0.9,0.93,1.0) * m*m * smoothstep(0.09, 0.0, dst) * starF * 0.9 * tw;
    }
  }

  /* glowing moon — the night light source */
  float moonF = smoothstep(-2.0, -10.0, el);
  vec2 moonP = vec2(uMoonPos.x * uRes.x/uRes.y, uMoonPos.y);
  if(moonF > 0.0){
    float md = length(uv - moonP);
    sky += vec3(0.95,0.96,1.00) * smoothstep(0.032, 0.026, md) * 1.1 * moonF;
    sky += vec3(0.55,0.62,0.85) * 0.18 * exp(-md*md*40.0) * moonF;
    sky += vec3(0.35,0.42,0.65) * 0.05 * exp(-md*2.5) * moonF;
  }

  vec3 col = sky;
  /* light direction for cloud rims: sun by day, moon by night */
  vec2 lightP = (el > -6.0) ? sunP : moonP;
  vec2 toL = normalize(lightP - uv + vec2(1e-4));
  float sunSide = exp(-length(uv - sunP)*1.2);
  float opDay = 0.55 + 0.45*dayF;

  /* ---- far cumulus (high band) ---- */
  {
    float band = smoothstep(0.30, 0.48, f2.y) * (1.0 - smoothstep(0.88, 1.0, f2.y));
    float d   = cumulus(uv, 2.2, uOff*0.55, uCover - 0.03, uWob) * band;
    if(d > 0.002){
      float dUp = cumulus(uv + vec2(0.0, 0.045), 2.2, uOff*0.55, uCover - 0.03, uWob) * band;
      float dS  = cumulus(uv + toL*0.035, 2.2, uOff*0.55, uCover - 0.03, uWob) * band;
      float topness = clamp(1.0 - dUp*1.15, 0.0, 1.0);
      float rim = clamp((d - dS)*2.6, 0.0, 1.0) * clamp(d*(1.0-d)*4.0, 0.0, 1.0) * 0.45;
      float lit = clamp(0.25 + 0.60*topness + (lumps(uv, 2.2, uOff*0.55)-0.45)*1.15, 0.0, 1.0);
      vec3 cDay = mix(vec3(0.55,0.62,0.75), vec3(1.00,0.995,0.98), lit) + vec3(1.03,1.01,0.98)*rim;
      vec3 cNight = vec3(0.016,0.022,0.040)*(0.8+0.4*lit) + vec3(0.16,0.19,0.28)*rim*0.8;
      vec3 cCol = mix(cNight, cDay, dayF);
      cCol += warm * glowF * (0.30 + 0.50*sunSide) * (rim + 0.3*lit*d);
      col = mix(col, cCol, d * 0.90 * opDay);
    }
  }
  /* ---- near cumulus (low band, faster) ---- */
  {
    float band = smoothstep(0.0, 0.12, f2.y) * (1.0 - smoothstep(0.60, 0.80, f2.y));
    float d   = cumulus(uv, 1.4, uOff, uCover - 0.02, uWob) * band;
    if(d > 0.002){
      float dUp = cumulus(uv + vec2(0.0, 0.045), 1.4, uOff, uCover - 0.02, uWob) * band;
      float dS  = cumulus(uv + toL*0.035, 1.4, uOff, uCover - 0.02, uWob) * band;
      float topness = clamp(1.0 - dUp*1.15, 0.0, 1.0);
      float rim = clamp((d - dS)*2.6, 0.0, 1.0) * clamp(d*(1.0-d)*4.0, 0.0, 1.0) * 0.45;
      float lit = clamp(0.25 + 0.60*topness + (lumps(uv, 1.4, uOff)-0.45)*1.15, 0.0, 1.0);
      vec3 cDay = mix(vec3(0.50,0.57,0.71), vec3(1.02,1.00,0.985), lit) + vec3(1.03,1.01,0.98)*rim;
      vec3 cNight = vec3(0.018,0.024,0.044)*(0.8+0.4*lit) + vec3(0.18,0.21,0.30)*rim*0.8;
      vec3 cCol = mix(cNight, cDay, dayF);
      cCol += warm * glowF * (0.30 + 0.50*sunSide) * (rim + 0.3*lit*d);
      col = mix(col, cCol, d * 0.97 * opDay);
    }
  }

  vec2 c2 = f2 - 0.5;
  col *= 1.0 - dot(c2,c2)*0.35;
  col = aces(col);
  col = pow(col, vec3(1.0/2.2));
  gl_FragColor = vec4(col, 1.0);
}`;

const mat = new THREE.ShaderMaterial({
  uniforms,
  vertexShader: 'void main(){ gl_Position = vec4(position, 1.0); }',
  fragmentShader: frag
});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat));

function layout(){
  const w = window.innerWidth, h = window.innerHeight;
  const pr = Math.min(window.devicePixelRatio||1, CFG.maxDPR) * CFG.renderScale;
  renderer.setSize(Math.round(w*pr), Math.round(h*pr), false);
  renderer.domElement.style.width  = w+'px';
  renderer.domElement.style.height = h+'px';
  uniforms.uRes.value.set(Math.round(w*pr), Math.round(h*pr));
}
window.addEventListener('resize', layout);
layout();

/* ---------- real sun & moon from the wall clock ---------- */
const D2R = Math.PI/180;
function sunNow(){
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const N = Math.floor((now - start) / 86400000);
  const LT = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  const dec = -23.44 * Math.cos(2*Math.PI*(N + 10)/365) * D2R;
  const H = (LT - 12) * 15 * D2R;
  const phi = CFG.latitude * D2R;
  const el = Math.asin(Math.sin(phi)*Math.sin(dec) + Math.cos(phi)*Math.cos(dec)*Math.cos(H)) / D2R;
  const x = 0.5 + Math.sin(H) * 0.42;
  const y = Math.min(Math.max(0.16 + Math.max(el, -8)/90 * 0.55, 0.05), 0.72);
  /* serene moon roughly opposite the sun, high in the night sky */
  const mx = 0.5 - Math.sin(H) * 0.30;
  const my = 0.62 + Math.cos(H) * 0.10;
  return { el, x, y, mx, my };
}

/* real drift speed: near layer crosses in CFG.screenCross seconds.
   Offset computed in JS doubles (no float jitter, no midnight jump). */
function animate(){
  requestAnimationFrame(animate);
  const s = sunNow();
  uniforms.uSunEl.value = s.el;
  uniforms.uSunPos.value.set(s.x, s.y);
  uniforms.uMoonPos.value.set(s.mx, s.my);
  const t = Date.now() / 1000;
  uniforms.uOff.value = (t / CFG.screenCross) % 2048;
  uniforms.uWob.value = (t % 86400) * 0.002;
  renderer.render(scene, camera);
}
animate();

/* keep it a wallpaper: no interaction at all */
for(const ev of ['contextmenu','wheel','touchmove','dblclick','selectstart'])
  window.addEventListener(ev, e=>e.preventDefault(), { passive:false });
</script>
</body>
</html>
