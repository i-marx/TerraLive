<script>
'use strict';
/* ============================================================
   REAL-TIME EARTH — deep-space camera wallpaper
   - Earth rotation driven by true sidereal time (GMST) from the
     device clock. Sun, Moon, planets and stars are placed at
     their real J2000 equatorial positions for "now".
   - Live satellite cloud cover (EUMETSAT), refreshed every 3 h.
   - Camera: fixed in the ecliptic plane, offset from the Sun so
     a set fraction of the disk is in shadow. Non-interactive.
   ============================================================ */

const CFG = {
  exposure     : 1.0,
  /* off-centre cinematic framing: fx/fy = globe centre in screen fractions,
     r = globe radius as a fraction of screen height (landscape) / width (portrait) */
  frame : {
    land: { fx: 0.74, fy: 0.68, r: 0.62 },
    port: { fx: 0.60, fy: 0.63, r: 0.68 }
  },
  faintStars   : 45000,  // anonymous background stars
  milkyWay     : 60000,  // faint stars forming the real Milky Way band
  mwGlow       : 12000,  // soft diffuse glow points inside the band (long-exposure look)
  moonDist     : 60.27,  // Earth radii — TRUE scale: real orbit distance
  moonRadius   : 0.2727, // Earth radii — TRUE scale: real size
  cloudRefresh : 3*3600*1000,  // live satellite clouds update every 3 h
  shadowFrac   : 0.25,   // fraction of the visible disk in shadow (on the left edge)
  lockedRoll   : 90,     // deg roll for the far locked view (upright)
  /* location-lock: camera stays over the user's coords so Earth appears still
     and the Sun sweeps across for a real day/night cycle. lat/lon injected by
     the app as ?lock=1&lat=..&lon=.. ; lonOffset calibrates texture longitude. */
  mode           : 'full',   // 'full' | 'locked' | 'closeup'
  userLat        : 0,
  userLon        : 0,
  lonOffset      : 0,
  /* close-up (locked, zoomed): ~600 km altitude, oblique, horizon upper-left */
  cuAltitudeKm   : 8000,
  cuLookDown     : 80,       // location around mid-lower frame, curvature above
  cuAzimuth      : 300,
  cuRoll         : -20,      // space to the upper-left, location to the lower-right
  cuFov          : 58,
  starSphereR  : 3000,
  starCatalog  : 'https://cdn.jsdelivr.net/gh/ofrohn/d3-celestial@master/data/stars.6.json'
};

/* --- read location-lock settings passed by the app via the asset URL --- */
(function(){
  try{
    const q = new URLSearchParams(location.search);
    const m = q.get('mode');
    if(m === 'locked' || m === 'closeup') CFG.mode = m;
    else if(q.get('lock') === '1') CFG.mode = 'locked';
    const la = parseFloat(q.get('lat')), lo = parseFloat(q.get('lon'));
    if(isFinite(la) && isFinite(lo)){ CFG.userLat = la; CFG.userLon = lo; }
    else if(CFG.mode !== 'full') CFG.mode = 'full';
    if(q.has('lonOffset')) CFG.lonOffset = parseFloat(q.get('lonOffset')) || 0;
  }catch(e){}
})();

/* surface point (lat,lon) -> scene-frame direction, matching the globe texture
   mapping and the current Earth spin (gm = GMST in radians). */
function locationDir(lat, lon, gm){
  const D = Math.PI/180;
  const phi = (90 - lat) * D, theta = (lon + CFG.lonOffset + 180) * D;
  const lx = -Math.sin(phi)*Math.cos(theta);
  const ly =  Math.cos(phi);
  const lz =  Math.sin(phi)*Math.sin(theta);
  /* rotate about Y by gm (same as earth.rotation.y) */
  const c = Math.cos(gm), sN = Math.sin(gm);
  return [ lx*c + lz*sN, ly, -lx*sN + lz*c ];
}

/* ===================== ASTRONOMY (pure math) =====================
   All angles in degrees unless noted. Frame used by the scene:
   X -> vernal equinox, Y -> celestial north pole, Z = right-handed.
   //__ASTRO_START__ */
const D2R = Math.PI/180, R2D = 180/Math.PI;
function jdNow(ms){ return (ms===undefined?Date.now():ms)/86400000 + 2440587.5; }
function norm360(x){ x %= 360; return x < 0 ? x + 360 : x; }
function gmstDeg(n){ return norm360(280.46061837 + 360.98564736629*n); }
function obliquity(n){ return 23.439 - 0.00000036*n; }

function sunEcl(n){                    // geocentric ecliptic longitude of the Sun
  const L = norm360(280.460 + 0.98564736*n);
  const g = (357.528 + 0.98560028*n)*D2R;
  return { lam: norm360(L + 1.915*Math.sin(g) + 0.020*Math.sin(2*g)), bet: 0 };
}

function moonEcl(n){                   // low-precision lunar ephemeris (Astronomical Almanac)
  const s = a=>Math.sin(a*D2R), c = a=>Math.cos(a*D2R);
  const lam = norm360(218.32 + 13.176396*n
    + 6.29*s(134.9+13.064993*n) - 1.27*s(259.2-0.185195*n)
    + 0.66*s(235.7+24.381500*n) + 0.21*s(269.9+26.107648*n)
    - 0.19*s(357.5+0.985600*n)  - 0.11*s(106.5-0.052954*n));
  const bet = 5.13*s(93.3+13.229350*n) + 0.28*s(228.2+25.585981*n)
    - 0.28*s(318.3+1.116538*n) - 0.17*s(217.6-0.028997*n);
  const par = 0.9508 + 0.0518*c(134.9+13.064993*n) + 0.0095*c(259.2-0.185195*n)
    + 0.0078*c(235.7+24.381500*n) + 0.0028*c(269.9+26.107648*n);
  return { lam, bet, distER: 1/Math.sin(par*D2R) };
}

/* ecliptic (lam,bet) -> scene frame [x,y,z] */
function eclToArr(lam, bet, n){
  const e = obliquity(n)*D2R, l = lam*D2R, b = bet*D2R;
  const xe = Math.cos(b)*Math.cos(l), ye = Math.cos(b)*Math.sin(l), ze = Math.sin(b);
  const xq = xe, yq = ye*Math.cos(e) - ze*Math.sin(e), zq = ye*Math.sin(e) + ze*Math.cos(e);
  return [xq, zq, -yq];
}
/* equatorial (RA,Dec) -> scene frame [x,y,z] */
function radecToArr(ra, dec){
  const a = ra*D2R, d = dec*D2R;
  return [Math.cos(d)*Math.cos(a), Math.sin(d), -Math.cos(d)*Math.sin(a)];
}
function eclNorthArr(n){ const e = obliquity(n)*D2R; return [0, Math.cos(e), Math.sin(e)]; }

/* --- naked-eye planets: JPL approximate Keplerian elements (J2000 + rates/century) --- */
const PLANET_EL = {
  Mercury:[0.38709927,0.20563593, 7.00497902,252.25032350, 77.45779628, 48.33076593,
           0.00000037,0.00001906,-0.00594749,149472.67411175,0.16047689,-0.12534081],
  Venus  :[0.72333566,0.00677672, 3.39467605,181.97909950,131.60246718, 76.67984255,
           0.00000390,-0.00004107,-0.00078890,58517.81538729,0.00268329,-0.27769418],
  Earth  :[1.00000261,0.01671123,-0.00001531,100.46457166,102.93768193,  0.0,
           0.00000562,-0.00004392,-0.01294668,35999.37244981,0.32327364, 0.0],
  Mars   :[1.52371034,0.09339410, 1.84969142, -4.55343205,-23.94362959, 49.55953891,
           0.00001847,0.00007882,-0.00813131,19140.30268499,0.44441088,-0.29257343],
  Jupiter:[5.20288700,0.04838624, 1.30439695, 34.39644051, 14.72847983,100.47390909,
          -0.00011607,-0.00013253,-0.00183714,3034.74612775,0.21252668, 0.20469106],
  Saturn :[9.53667594,0.05386179, 2.48599187, 49.95424423, 92.59887831,113.66242448,
          -0.00125060,-0.00050991, 0.00193609,1222.49362201,-0.41897216,-0.28867794]
};
function helioPos(name, T){            // heliocentric ecliptic J2000, AU
  const el = PLANET_EL[name];
  const a = el[0]+el[6]*T, e = el[1]+el[7]*T, I = (el[2]+el[8]*T)*D2R;
  const L = el[3]+el[9]*T, w = el[4]+el[10]*T, O = el[5]+el[11]*T;
  const om = (w - O)*D2R, Om = O*D2R;
  let M = norm360(L - w)*D2R;
  let E = M + e*Math.sin(M);
  for(let i=0;i<6;i++) E = E - (E - e*Math.sin(E) - M)/(1 - e*Math.cos(E));
  const xp = a*(Math.cos(E)-e), yp = a*Math.sqrt(1-e*e)*Math.sin(E);
  const co=Math.cos(om), so=Math.sin(om), cO=Math.cos(Om), sO=Math.sin(Om), ci=Math.cos(I), si=Math.sin(I);
  return [
    (co*cO - so*sO*ci)*xp + (-so*cO - co*sO*ci)*yp,
    (co*sO + so*cO*ci)*xp + (-so*sO + co*cO*ci)*yp,
    (so*si)*xp + (co*si)*yp
  ];
}
const PLANET_VIS = {                    // V(1,0) magnitude, tint
  Mercury:{m0:-0.6, col:[1.00,0.93,0.84]},
  Venus  :{m0:-4.5, col:[1.00,0.97,0.88]},
  Mars   :{m0:-1.5, col:[1.00,0.72,0.55]},
  Jupiter:{m0:-9.4, col:[1.00,0.93,0.80]},
  Saturn :{m0:-8.9, col:[0.99,0.92,0.72]}
};
function planetsGeo(n){                 // geocentric ecliptic positions + rough magnitudes
  const T = n/36525, ep = helioPos('Earth', T), out = [];
  for(const name of ['Mercury','Venus','Mars','Jupiter','Saturn']){
    const p = helioPos(name, T);
    const gx = p[0]-ep[0], gy = p[1]-ep[1], gz = p[2]-ep[2];
    const delta = Math.sqrt(gx*gx+gy*gy+gz*gz);
    const r = Math.sqrt(p[0]*p[0]+p[1]*p[1]+p[2]*p[2]);
    const lam = norm360(Math.atan2(gy, gx)*R2D);
    const bet = Math.asin(gz/delta)*R2D;
    const mag = PLANET_VIS[name].m0 + 5*Math.log10(Math.max(r*delta, 1e-6));
    out.push({ name, lam, bet, mag, col: PLANET_VIS[name].col });
  }
  return out;
}

/* star colour from B-V index */
function bvToRGB(bv){
  bv = Math.max(-0.4, Math.min(2.0, bv)); let t, r, g, b;
  if(bv < 0){ t=(bv+0.4)/0.4; r=0.61+0.11*t+0.1*t*t; }
  else if(bv < 0.4){ t=bv/0.4; r=0.83+0.17*t; } else r=1.0;
  if(bv < 0){ t=(bv+0.4)/0.4; g=0.70+0.07*t+0.1*t*t; }
  else if(bv < 0.4){ t=bv/0.4; g=0.87+0.11*t; }
  else if(bv < 1.6){ t=(bv-0.4)/1.2; g=0.98-0.16*t; }
  else { t=(bv-1.6)/0.4; g=0.82-0.5*t*t; }
  if(bv < 0.4) b=1.0;
  else if(bv < 1.5){ t=(bv-0.4)/1.1; b=1.0-0.47*t+0.1*t*t; }
  else { t=(bv-1.5)/0.5; b=0.63-0.6*t*t; }
  return [r,g,b];
}
function magToSize(m){ return Math.max(1.0, 7.0*Math.pow(10, -0.115*m)); }

/* ---------- texture loading with fallback chains (NASA Blue Marble / Black Marble imagery) ---------- */
const texLoader = new THREE.TextureLoader();
texLoader.setCrossOrigin('anonymous');
function loadTex(urls){
  return new Promise(res=>{
    const tryOne = i=>{
      if(i >= urls.length) return res(null);
      texLoader.load(urls[i], t=>{
        t.anisotropy = renderer.capabilities.getMaxAnisotropy();
        t.minFilter = THREE.LinearMipmapLinearFilter;   // trilinear -> less crawling
        t.magFilter = THREE.LinearFilter;                // smooth, not blocky, up close
        t.generateMipmaps = true;
        res(t);
      },
        undefined, ()=>tryOne(i+1));
    };
    tryOne(0);
  });
}
function flatTex(rgb){
  const cv = document.createElement('canvas'); cv.width = cv.height = 2;
  const cx = cv.getContext('2d'); cx.fillStyle = rgb; cx.fillRect(0,0,2,2);
  return new THREE.CanvasTexture(cv);
}

let liveClouds = false;
function liveCloudURLs(){  // cache-bust once per update window so new satellite data comes through

const earthMat = new THREE.ShaderMaterial({
  uniforms: earthUniforms,
  vertexShader: `
    varying vec3 vN; varying vec3 vWP; varying vec2 vUv;
    void main(){
      vUv = uv;
      vN  = normalize(mat3(modelMatrix) * normal);
      vec4 wp = modelMatrix * vec4(position,1.0);
      vWP = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: `
    uniform sampler2D dayMap; uniform sampler2D nightMap; uniform sampler2D waterMap;
    uniform sampler2D cloudMap; uniform sampler2D topoMap;
    uniform float uHasWater; uniform float uHasNight; uniform float uHasClouds;
    uniform float uHasTopo; uniform float uCloudShift; uniform vec3 sunDir;
    uniform float uNightBlur; uniform float uDetail;
    uniform sampler2D regDay; uniform sampler2D regNight;
    uniform float uHasRegD; uniform float uHasRegN; uniform vec4 uReg;
    uniform vec3 uMoonDir; uniform float uMoonAmt;
    uniform sampler2D snowMap; uniform float uHasSnow;
    varying vec3 vN; varying vec3 vWP; varying vec2 vUv;
    vec3 aces(vec3 x){ return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0); }
    float hash21(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
    void main(){
      vec3 nGeo = normalize(vN);
      vec3 n = nGeo;
      vec3 vd = normalize(cameraPosition - vWP);
      /* terrain relief: perturb the normal with real elevation data so
         mountain ranges catch the light (the 'Apple Earth' look) */
      if(uHasTopo > 0.5){
        vec3 east  = normalize(cross(vec3(0.0,1.0,0.0), nGeo) + vec3(1e-5));
        vec3 north = cross(nGeo, east);
        float e0 = texture2D(topoMap, vUv).r;
        float ex = texture2D(topoMap, vUv + vec2(0.0007, 0.0)).r;
        float ey = texture2D(topoMap, vUv + vec2(0.0, 0.0014)).r;
        n = normalize(nGeo - (east*(ex - e0) + north*(ey - e0)) * 12.0);
      }
      float ca = dot(n, sunDir);
      float daylight = max(ca, 0.0);
      float dmix = smoothstep(-0.1, 0.15, dot(nGeo, sunDir));
      /* hi-res regional patch (close-up): NASA GIBS 500m imagery around the
         user's location, feather-blended into the global 8K map */
      vec2 rr = vec2((fract(vUv.x - uReg.x + 0.5) - 0.5) / max(uReg.z, 1e-4),
                     (vUv.y - uReg.y) / max(uReg.w, 1e-4));
      vec2 ruv = clamp(rr*0.5 + 0.5, 0.0, 1.0);
      float rin = 1.0 - smoothstep(0.88, 0.985, max(abs(rr.x), abs(rr.y)));
      /* work in linear light like a real camera pipeline */
      vec3 day = pow(texture2D(dayMap, vUv, -0.45).rgb, vec3(2.2));
      day = mix(day, pow(texture2D(regDay, ruv, -0.35).rgb, vec3(2.2)), rin * uHasRegD);
      /* ocean lift: deep water in the source imagery is crushed near black.
         Real oceans seen from space read as rich blue (atmospheric scattering),
         so lift only dark WATER pixels toward a deep sea blue. */
      if(uHasWater > 0.5){
        float wat = texture2D(waterMap, vUv).r;
        float dl  = dot(day, vec3(0.2126, 0.7152, 0.0722));
        float lift = wat * smoothstep(0.060, 0.008, dl);
        day = mix(day, vec3(0.030, 0.078, 0.168), lift * 0.60);
      }
      /* seasons: real daily snow cover (MODIS) whitens the land it truly covers */
      if(uHasSnow > 0.5){
        float sn = texture2D(snowMap, vUv).r;
        float wat2 = (uHasWater > 0.5) ? texture2D(waterMap, vUv).r : 0.0;
        day = mix(day, vec3(0.60, 0.66, 0.75), sn * (1.0 - wat2*0.85) * 0.85);
      }
      vec3 sunCol = vec3(1.0, 0.97, 0.93);
      vec3 col = day * sunCol * (daylight * 2.7 + 0.0012);
      /* close-up only: fine terrain grain locked to the surface, breaks up
         texture softness at low altitude without any temporal shimmer */
      if(uDetail > 0.5){
        vec2 gp = vUv * 3600.0;
        vec2 gi = floor(gp), gf = fract(gp); gf = gf*gf*(3.0-2.0*gf);
        float g = mix(mix(hash21(gi), hash21(gi+vec2(1,0)), gf.x),
                      mix(hash21(gi+vec2(0,1)), hash21(gi+vec2(1,1)), gf.x), gf.y);
        col *= 1.0 + (g - 0.5) * 0.11 * dmix * (1.0 - rin * uHasRegD);
      }
      /* no ocean sun reflection — testers found the specular blob distracting */
      /* cloud shadows: sample the cloud layer displaced along the sun direction */
      if(uHasClouds > 0.5){
        vec3 east  = normalize(cross(vec3(0.0,1.0,0.0), n) + vec3(1e-5));
        vec3 north = cross(n, east);
        vec3 st = sunDir - n*ca;
        float stl = length(st) + 1e-5;
        float arc = 0.012 * clamp(stl/max(ca, 0.25), 0.0, 3.0);
        float cosLat = max(sqrt(1.0 - n.y*n.y), 0.2);
        vec2 suv = vec2(
          vUv.x - uCloudShift - arc*dot(st/stl, east)/(6.28319*cosLat),
          vUv.y - arc*dot(st/stl, north)/3.14159);
        vec4 ct = texture2D(cloudMap, suv);
        col *= 1.0 - (ct.r*ct.a) * 0.45 * dmix;
      }
      /* warm band along the terminator */
      float tw = smoothstep(-0.05, 0.03, ca) * (1.0 - smoothstep(0.03, 0.30, ca));
      col *= mix(vec3(1.0), vec3(1.10, 0.93, 0.82), tw * 0.3);
      /* city lights: sampled from a blurred mip level (LOD bias) so they read as
         smooth glowing pools instead of blocky pixels — hardware trilinear blur,
         no multi-tap duplicates or crawl. Bias is raised for the close-up. */
      vec3 nSharp = pow(texture2D(nightMap, vUv).rgb, vec3(2.2));
      vec3 nSoft  = pow(texture2D(nightMap, vUv, uNightBlur).rgb, vec3(2.2));
      float rN = rin * uHasRegN;
      /* regional VIIRS lights: crisp cores + a touch of glow from a soft mip */
      vec3 rgN = pow(texture2D(regNight, ruv, 0.4).rgb, vec3(2.2));
      vec3 rgG = pow(texture2D(regNight, ruv, 2.2).rgb, vec3(2.2));
      nSharp = mix(nSharp, rgN + rgG*0.6, rN);
      vec3 lights = nSoft * (0.9 + 0.7*step(1.5, uNightBlur)) * (1.0 - 0.55*rN)
                  + nSharp * (0.22 + 0.85*rN);
      col += lights * vec3(1.0, 0.80, 0.52) * (1.0 - dmix) * 2.1 * uHasNight;
      /* atmospheric scattering: soft haze thickening toward the limb */
      float mu = max(dot(nGeo, vd), 0.0);
      float haze = pow(1.0 - mu, 2.0);
      col = mix(col, vec3(0.40, 0.58, 0.95) * (0.95*dmix + 0.02), haze * 0.32);
      /* bright inner rim - whiter, like the real atmosphere */
      col += vec3(0.55, 0.75, 1.05) * pow(1.0 - mu, 4.5) * (0.7*dmix + 0.03);
      /* airglow: the faint green oxygen emission rim on the night limb */
      col += vec3(0.10, 0.34, 0.20) * pow(1.0 - mu, 5.0) * (1.0 - dmix) * 0.40;
      /* moonlight: the night side is faintly lit blue-grey by the real Moon,
         scaled by its current phase */
      float mlit = max(dot(n, uMoonDir), 0.0);
      col += day * vec3(0.32, 0.44, 0.64) * mlit * (1.0 - dmix) * 0.055 * uMoonAmt;
      /* natural-colour grade + filmic curve */
      col = mix(col, col * vec3(0.96, 1.00, 1.05), 0.10);
      col = aces(col);
      float lumi = dot(col, vec3(0.2126, 0.7152, 0.0722));
      col = mix(vec3(lumi), col, 1.14);
      col = pow(col, vec3(1.08));
      col = pow(col, vec3(1.0/2.2));
      gl_FragColor = vec4(col, 1.0);
    }`
});

/* the real Milky Way: tens of thousands of faint stars packed along the
   true galactic plane (galactic pole RA 192.86, Dec 27.13; centre in Sagittarius) */
(function(){
  const zg = new THREE.Vector3(...radecToArr(192.859, 27.128));            // galactic north pole
  let xg = new THREE.Vector3(...radecToArr(266.405, -28.936));             // galactic centre
  xg.sub(zg.clone().multiplyScalar(xg.dot(zg))).normalize();               // orthogonalize
  const yg = new THREE.Vector3().crossVectors(zg, xg);
  const gauss = ()=>{ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); };
  const N = CFG.milkyWay, NG = CFG.mwGlow, NT = N + NG;
  const pos = new Float32Array(NT*3), col = new Float32Array(NT*3), siz = new Float32Array(NT);
  const R = CFG.starSphereR * 1.01;
  let i = 0, guard = 0;
  while(i < NT && guard < NT*8){
    guard++;
    const glow = i >= N;                       // diffuse haze pass on top of the star pass
    const l = Math.random()*Math.PI*2;
    /* band is thicker and denser toward the galactic centre (l = 0) */
    const centerness = 0.5 + 0.5*Math.cos(l);
    const sigma = (7 + 9*centerness) * (glow ? 1.8 : 1.0) * D2R;
    const b = gauss()*sigma;
    /* the Great Rift: dark dust lanes carving through the band near the core */
    const dl = Math.cos(l) > 0.25 ? (Math.cos(l)-0.25)/0.75 : 0;
    if(!glow && dl > 0){
      const lane = (-1.0 + 1.6*Math.sin(l*3.0)) * D2R;
      const w = (1.3 + 2.4*dl) * D2R;
      const dust = Math.exp(-((b-lane)*(b-lane))/(2.0*w*w));
      if(Math.random() < dust * 0.78) continue;   // star swallowed by dust
    }
    const cb = Math.cos(b);
    const d = new THREE.Vector3()
      .addScaledVector(xg, cb*Math.cos(l))
      .addScaledVector(yg, cb*Math.sin(l))
      .addScaledVector(zg, Math.sin(b));
    pos[i*3]=d.x*R; pos[i*3+1]=d.y*R; pos[i*3+2]=d.z*R;
    /* warm golden bulge near the core, cool blue-white arms */
    const wf = centerness * Math.max(0, 1 - Math.abs(b)/(10*D2R));
    let lum;
    if(glow){
      lum = (0.020 + Math.random()*0.040) * (0.45 + 0.55*centerness);
      col[i*3]  = lum*(1.00 + 0.45*wf);
      col[i*3+1]= lum*(0.95 - 0.12*wf);
      col[i*3+2]= lum*(1.10 - 0.55*wf);
    } else {
      lum = (0.16 + Math.random()*0.30) * (0.5 + 0.5*centerness);
      col[i*3]  = lum*(0.92 + 0.24*wf);
      col[i*3+1]= lum*(0.94 - 0.04*wf);
      col[i*3+2]= lum*(1.06 - 0.42*wf);
    }
    siz[i] = glow ? 6.0 + Math.random()*8.0 : 0.9 + Math.random()*1.3;
    i++;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('aColor',   new THREE.BufferAttribute(col,3));
  g.setAttribute('aSize',    new THREE.BufferAttribute(siz,1));
  const m = new THREE.ShaderMaterial({
    uniforms:{ uPR:{ value: Math.min(window.devicePixelRatio||1,2) } },
    vertexShader: starVert, fragmentShader: starFrag,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  scene.add(new THREE.Points(g, m));
})();

   Every module is isolated: any feed failure or parse error silently degrades to
   nothing. Nothing here can crash the wallpaper. */
function localDir(lat, lon){
  const D = Math.PI/180;
  const phi = (90 - lat)*D, th = (lon + CFG.lonOffset + 180)*D;
  return new THREE.Vector3(-Math.sin(phi)*Math.cos(th), Math.cos(phi), Math.sin(phi)*Math.sin(th));
}
const angDistDeg = (la1,lo1,la2,lo2)=>{
  const D=Math.PI/180;
  const c=Math.sin(la1*D)*Math.sin(la2*D)+Math.cos(la1*D)*Math.cos(la2*D)*Math.cos((lo1-lo2)*D);
  return Math.acos(Math.min(1,Math.max(-1,c)))/D;
};

/* ---- REAL AURORA: NOAA SWPC OVATION live oval, procedural geomagnetic fallback ---- */
const aurUniforms = { aurMap:{ value: flatTex('#000000') }, sunDir: earthUniforms.sunDir, uAur:{ value: 1.35 } };
let aurReady = false;
function paintAurora(coords){
  const W=512, H=256;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const cx=cv.getContext('2d');
  const img=cx.createImageData(W,H);
  const put=(lon,lat,v)=>{
    let x=Math.round(((lon+CFG.lonOffset+180)/360)*W); x=((x%W)+W)%W;
    let y=Math.round(((90-lat)/180)*H); if(y<0)y=0; if(y>H-1)y=H-1;
    const i=(y*W+x)*4;
    if(v>img.data[i+1]) img.data[i+1]=v;
    img.data[i+3]=255;
  };
  if(coords){
    for(const c of coords){
      const v=Math.min(255, c[2]*5.6);
      if(v>3) put(c[0], c[1], v);
    }
  } else {
    /* fallback: statistical auroral ovals around the geomagnetic poles */
    const poles=[[80.65,-72.68],[-80.65,107.32]];
    for(let lat=-90; lat<=90; lat++) for(let lon=0; lon<360; lon+=1){
      let v=0;
      for(const p of poles){
        const th=angDistDeg(lat,lon,p[0],p[1]);
        v=Math.max(v, 150*Math.exp(-Math.pow(th-23,2)/40));
      }
      if(v>3) put(lon,lat,v);
    }
  }
  cx.putImageData(img,0,0);
  /* soften: down-up resample */
  const sm=document.createElement('canvas'); sm.width=128; sm.height=64;
  const sx=sm.getContext('2d'); sx.drawImage(cv,0,0,128,64);
  cx.clearRect(0,0,W,H); cx.drawImage(sm,0,0,W,H);
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=THREE.RepeatWrapping; t.minFilter=THREE.LinearMipmapLinearFilter;
  t.magFilter=THREE.LinearFilter; t.generateMipmaps=true;
  return t;
}

/* ---- LIGHTNING: flashes spawned inside the REAL live storm clouds, night side ---- */
let stormCells=null, stormTotW=0;
function buildStorms(tex){
  try{
    const im=tex&&tex.image; if(!im||!im.width) return;
    const W=180,H=90;
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const cx=cv.getContext('2d'); cx.drawImage(im,0,0,W,H);
    const d=cx.getImageData(0,0,W,H).data;
    const cells=[]; let tot=0;
    for(let y=0;y<H;y++){
      const lat=90-(y+0.5)*180/H;
      const latW=0.30+0.70*Math.exp(-Math.pow(lat/26,2));   /* tropics flash most */
      for(let x=0;x<W;x++){
        const i=(y*W+x)*4;
        const v=(d[i]/255)*(d[i+3]/255);
        if(v>0.55){
          const lon=(x+0.5)*360/W-180-CFG.lonOffset;
          tot+=v*v*latW; cells.push([lon,lat,tot]);
        }
      }
    }
    if(cells.length>10){ stormCells=cells; stormTotW=tot; }
  }catch(e){}
}
const flashes=[];
try{
  const gt=glowTexture();
  for(let i=0;i<5;i++){
    const m=new THREE.SpriteMaterial({ map:gt, transparent:true, depthWrite:false,
      blending:THREE.AdditiveBlending, color:new THREE.Color(0.80,0.88,1.0), opacity:0 });
    const sp=new THREE.Sprite(m); sp.scale.set(0.02,0.02,1); earth.add(sp);
    flashes.push({sp, life:0, dur:0.25, amp:1});
  }
}catch(e){}
function spawnFlash(gm, sd){
  if(!stormCells) return;
  const fl=flashes.find(o=>o.life<=0); if(!fl) return;
  const r=Math.random()*stormTotW;
  let lo=0, hi=stormCells.length-1;
  while(lo<hi){ const mid=(lo+hi)>>1; if(stormCells[mid][2]<r) lo=mid+1; else hi=mid; }
  const c=stormCells[lo];
  const lat=c[1]+(Math.random()-0.5)*2.0, lon=c[0]+(Math.random()-0.5)*2.0;
  const wd=locationDir(lat,lon,gm);
  if(wd[0]*sd[0]+wd[1]*sd[1]+wd[2]*sd[2] > -0.05) return;   /* invisible by day */
  const d=localDir(lat,lon);
  fl.sp.position.set(d.x*1.006, d.y*1.006, d.z*1.006);
  fl.dur=0.12+Math.random()*0.25; fl.life=fl.dur; fl.amp=0.55+Math.random()*0.85;
  const sc=0.012+Math.random()*0.016; fl.sp.scale.set(sc,sc,1);
}

/* ---- METEORS: rare streaks, rate driven by the real shower calendar ---- */
let meteor=null;
try{
  const m=new THREE.SpriteMaterial({ map:glowTexture(), transparent:true, depthWrite:false,
    blending:THREE.AdditiveBlending, color:new THREE.Color(0.90,0.95,1.0), opacity:0 });
  meteor={sp:new THREE.Sprite(m), life:0, dur:0.5};
  meteor.sp.scale.set(110,7,1); scene.add(meteor.sp);

function meteorRate(){
  const d=new Date(), mo=d.getMonth()+1, da=d.getDate();
  const showers=[[1,1,5],[4,19,24],[5,3,8],[8,9,15],[10,18,23],[11,15,19],[12,11,15]];
  for(const sh of showers) if(mo===sh[0] && da>=sh[1] && da<=sh[2]) return 1/55;
  return 1/260;
}
function spawnMeteor(){
  if(!meteor || meteor.life>0) return;
  const u=Math.random()*2-1, th=Math.random()*Math.PI*2, rr=Math.sqrt(1-u*u);
  const R=CFG.starSphereR*0.96;
  meteor.sp.position.set(rr*Math.cos(th)*R, u*R, rr*Math.sin(th)*R);
  meteor.sp.material.rotation=Math.random()*Math.PI*2;
  meteor.dur=0.30+Math.random()*0.35; meteor.life=meteor.dur;
}

/* ---- per-frame driver for all living-planet extras ---- */
let _lastMs=0;
function updateExtras(gm, sd, mdU, illum){
  const now=performance.now();
  const dt=Math.min(0.1, _lastMs? (now-_lastMs)/1000 : 0.016); _lastMs=now;
  /* moonlight uniforms */
  earthUniforms.uMoonDir.value.set(mdU[0], mdU[1], mdU[2]);
  earthUniforms.uMoonAmt.value=illum;
  /* the Sun at its true place in the sky */
  if(sunCore){
    const R=CFG.starSphereR*0.94;
    sunCore.position.set(sd[0]*R, sd[1]*R, sd[2]*R);
    sunHalo.position.copy(sunCore.position);
  }
  /* lightning */
  if(stormCells && Math.random() < dt/1.1){ spawnFlash(gm, sd); if(Math.random()<0.30) spawnFlash(gm, sd); }
  for(const fl of flashes){
    if(fl.life>0){ fl.life-=dt; const e=Math.max(0, fl.life/fl.dur);
      fl.sp.material.opacity=fl.amp*Math.pow(e,1.5); }
    else if(fl.sp.material.opacity>0) fl.sp.material.opacity=0;
  }
  /* ISS */
  if(issSp && issData){
    let la=issData.la, lo=issData.lo;
    if(issPrev){
      const span=issData.t-issPrev.t;
      if(span>1000){
        const k=Math.min((now-issData.t)/span, 2.5);
        la+= (issData.la-issPrev.la)*k;
        lo+= (((issData.lo-issPrev.lo+540)%360)-180)*k;
      }
    }
    const rr=1+(issData.al||420)/6371;
    const d=localDir(la,lo);
    issSp.position.set(d.x*rr, d.y*rr, d.z*rr);
    issSp.material.opacity = issData.ecl? 0.0 : 0.85;
  }
  /* disaster embers glow only in their local night */
  const tsec=now/1000;
  for(const em of embers){
    const wd=locationDir(em.lat, em.lon, gm);
    const dn=wd[0]*sd[0]+wd[1]*sd[1]+wd[2]*sd[2];
    const nightF=Math.min(1, Math.max(0, (-dn-0.02)/0.12));
    em.sp.material.opacity = em.base*nightF*(0.80+0.25*Math.sin(tsec*2.6+em.ph));
  }
  /* meteors */
  if(meteor){
    if(Math.random() < dt*meteorRate()*60) spawnMeteor();
    if(meteor.life>0){ meteor.life-=dt;
      const ph=1-Math.max(0,meteor.life)/meteor.dur;
      meteor.sp.material.opacity=0.55*Math.sin(Math.min(ph,1)*3.14159); }
    else if(meteor.sp.material.opacity>0) meteor.sp.material.opacity=0;
  }
}

/* ---------- load imagery ---------- */
/* Close-up only: fetch 500m/px NASA GIBS imagery for the region around the
   user's location and hand it to the shader as a hi-res patch. */
function loadRegional(){
  if(CFG.mode !== 'closeup') return;
  const ext = 28;
  let la0 = CFG.userLat - ext, la1 = CFG.userLat + ext;
  if(la0 < -89){ la1 += (-89 - la0); la0 = -89; }
  if(la1 >  89){ la0 -= (la1 - 89);  la1 =  89; }
  const lo0 = CFG.userLon - ext, lo1 = CFG.userLon + ext;   /* may cross the date line */
  const latC = (la0 + la1)/2, lonC = (lo0 + lo1)/2;
  const uc = (((lonC + CFG.lonOffset + 180)/360) % 1 + 1) % 1;
  const vc = (latC + 90)/180;
  earthUniforms.uReg.value.set(uc, vc, (lo1 - lo0)/720, (la1 - la0)/360);
  const wmsURL = (layer, b0, b1, w, h)=> 'https://gibs.earthdata.nasa.gov/wms/epsg4326/best/wms.cgi' +
    '?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&SRS=EPSG:4326&STYLES=&FORMAT=image/jpeg' +
    '&BBOX=' + b0 + ',' + la0 + ',' + b1 + ',' + la1 + '&LAYERS=' + layer + '&WIDTH=' + w + '&HEIGHT=' + h;
  const loadImg = url => new Promise(res=>{
    const im = new Image(); im.crossOrigin = 'anonymous';
    im.onload = ()=>res(im); im.onerror = ()=>res(null); im.src = url;
  });
  function finishTex(cv){
    const t = new THREE.CanvasTexture(cv);
    t.anisotropy = renderer.capabilities.getMaxAnisotropy();
    t.minFilter = THREE.LinearMipmapLinearFilter;
    t.magFilter = THREE.LinearFilter;
    t.generateMipmaps = true; t.needsUpdate = true;
    return t;
  }
  function loadLayer(layer, sz){
    if(lo0 >= -180 && lo1 <= 180){
      return loadImg(wmsURL(layer, lo0, lo1, sz, sz)).then(im=>{
        if(!im) return null;
        const cv = document.createElement('canvas'); cv.width = sz; cv.height = sz;
        cv.getContext('2d').drawImage(im, 0, 0, sz, sz);
        return finishTex(cv);
      });
    }
    /* box crosses the +-180 date line: fetch both halves and stitch them */
    const aw = (lo0 < -180) ? (180 - (lo0 + 360)) : (180 - lo0);
    const total = lo1 - lo0;
    const wA = Math.max(8, Math.round(sz * aw / total)), wB = sz - wA;
    const A = (lo0 < -180) ? [lo0 + 360, 180] : [lo0, 180];
    const B = (lo0 < -180) ? [-180, lo1] : [-180, lo1 - 360];
    return Promise.all([loadImg(wmsURL(layer, A[0], A[1], wA, sz)),
                        loadImg(wmsURL(layer, B[0], B[1], wB, sz))]).then(([ia, ib])=>{
      if(!ia || !ib) return null;
      const cv = document.createElement('canvas'); cv.width = sz; cv.height = sz;
      const cx = cv.getContext('2d');
      cx.drawImage(ia, 0, 0, wA, sz); cx.drawImage(ib, wA, 0, wB, sz);
      return finishTex(cv);
    });
  }
  const tryLayer = (layer, apply)=> loadLayer(layer, 4096)
    .then(t=> t ? apply(t) : loadLayer(layer, 2048).then(t2=>{ if(t2) apply(t2); }));
  tryLayer('BlueMarble_NextGeneration', t=>{ earthUniforms.regDay.value = t; earthUniforms.uHasRegD.value = 1.0; });
  tryLayer('VIIRS_Black_Marble',        t=>{ earthUniforms.regNight.value = t; earthUniforms.uHasRegN.value = 1.0; });
}
loadRegional();

Promise.all([loadTex(URLS.day), loadTex(URLS.night), loadTex(URLS.water),

/* ===================== LAYOUT (PC + mobile) ===================== */
let camDist = 4.7;
function layout(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w/h;
  camera.clearViewOffset();
  if(CFG.mode === 'closeup'){
    /* wide field for the low-orbit oblique; globe centred (no view offset).
       tiny near plane so the surface just below the camera isn't clipped. */
    camera.fov = CFG.cuFov;
    camera.near = 0.02;
    camera.updateProjectionMatrix();
    var veil = document.getElementById('veil');
    if(veil) veil.style.background =
      'linear-gradient(to top, rgba(4,7,14,0.55) 0%, rgba(4,7,14,0.20) 20%, rgba(0,0,0,0) 42%)';
    return;
  }
  if(CFG.mode === 'locked'){
    /* full disk, centred on screen */
    camera.fov = 40;
    camera.near = 0.1;
    const vHalf = camera.fov * 0.5 * D2R;
    const r = 0.82;   // disk fills 82% of the smaller dimension
    const th = camera.aspect >= 1
      ? Math.atan(2 * r * Math.tan(vHalf))
      : Math.atan(2 * r * Math.tan(vHalf) * camera.aspect);
    camDist = 1 / Math.sin(Math.max(0.05, Math.min(th, 1.3)));
    camera.updateProjectionMatrix();
    return;
  }
  camera.fov = 40;
  camera.near = 0.1;
  const F = camera.aspect >= 1 ? CFG.frame.land : CFG.frame.port;
  const vHalf = camera.fov * 0.5 * D2R;
  const th = camera.aspect >= 1
    ? Math.atan(2 * F.r * Math.tan(vHalf))
    : Math.atan(2 * F.r * Math.tan(vHalf) * camera.aspect);
  camDist = 1 / Math.sin(Math.max(0.05, Math.min(th, 1.3)));
  camera.setViewOffset(w, h, w*(0.5 - F.fx), h*(0.5 - F.fy), w, h);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', layout);
layout();

/* ===================== REAL-TIME UPDATE ===================== */
const _v = new THREE.Vector3();
function setFromArr(vec, a){ vec.set(a[0], a[1], a[2]); return vec; }

function update(){
  const n = jdNow() - 2451545.0;

  /* Earth rotation: Greenwich meridian sits at RA = GMST */
  const gm = gmstDeg(n) * D2R;
  earth.rotation.y  = gm;
  /* live satellite clouds are already where they really are - no artificial drift */
  const drift = liveClouds ? 0 : (n * 0.22) % (Math.PI*2);
  clouds.rotation.y = gm + drift;
  earthUniforms.uCloudShift.value = drift / (Math.PI*2);

  /* Sun */
  const s = sunEcl(n);
  const sd = eclToArr(s.lam, 0, n);
  earthUniforms.sunDir.value.set(sd[0], sd[1], sd[2]);
  /* sharp lights when far, smooth blurred glow when zoomed in close */
  earthUniforms.uNightBlur.value = (CFG.mode === 'closeup') ? 3.0 : 0.6;
  earthUniforms.uDetail.value    = (CFG.mode === 'closeup') ? 1.0 : 0.0;
  sunLight.position.set(sd[0]*100, sd[1]*100, sd[2]*100);

  /* Moon: true direction, tidally locked, correct phase from the same sunlight */
  const mo = moonEcl(n);
  const md = eclToArr(mo.lam, mo.bet, n);
  moon.position.set(md[0]*CFG.moonDist, md[1]*CFG.moonDist, md[2]*CFG.moonDist);
  moon.lookAt(0,0,0); moon.rotateY(-Math.PI/2);

  /* Planets */
  for(const p of planetsGeo(n)){
    const v = eclToArr(p.lam, p.bet, n);
    const sp = planetSprites[p.name];
    sp.position.set(v[0]*2900, v[1]*2900, v[2]*2900);
    const sc = 2900 * 0.0021 * Math.pow(10, -0.09 * Math.max(p.mag, -4.6));
    sp.scale.set(sc, sc, 1);
    sp.material.opacity = Math.min(1, Math.pow(10, -0.2*(p.mag - 1.5)));
  }

  /* living-planet extras: aurora is shader-side; the rest animate here.
     Failsafe: nothing in here can take the wallpaper down. */
  try{
    const mdU=[md[0], md[1], md[2]];
    const illum=(1-(mdU[0]*sd[0]+mdU[1]*sd[1]+mdU[2]*sd[2]))*0.5;
    updateExtras(gm, sd, mdU, illum);
  }catch(e){}

  if(CFG.mode === 'closeup'){
    /* Locked low-orbit oblique: camera sits ~600 km above the user's location
       (which co-rotates with the spin -> globe still, Sun sweeps). It looks
       toward the horizon so the surface fills the frame with the limb + space
       in the upper-left. Framing verified against ISS reference imagery. */
    const Lp = new THREE.Vector3(...locationDir(CFG.userLat, CFG.userLon, gm));
    const E = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), Lp).normalize();
    const N = new THREE.Vector3().crossVectors(Lp, E);
    const az = CFG.cuAzimuth*D2R, ld = CFG.cuLookDown*D2R, roll = CFG.cuRoll*D2R;
    const tangent = E.clone().multiplyScalar(Math.sin(az)).addScaledVector(N, Math.cos(az));
    const camR = (6371 + CFG.cuAltitudeKm) / 6371;
    camera.position.copy(Lp).multiplyScalar(camR);
    const fwd = Lp.clone().multiplyScalar(-Math.sin(ld)).addScaledVector(tangent, Math.cos(ld)).normalize();
    let right = new THREE.Vector3().crossVectors(fwd, Lp).normalize();
    let up = new THREE.Vector3().crossVectors(right, fwd);
    right = right.multiplyScalar(Math.cos(roll)).addScaledVector(up, Math.sin(roll));
    up = new THREE.Vector3().crossVectors(right, fwd);
    camera.up.copy(up);
    camera.lookAt(camera.position.x + fwd.x, camera.position.y + fwd.y, camera.position.z + fwd.z);
  } else if(CFG.mode === 'locked'){
    /* Camera locked over the user's location, full disk centred: co-rotates with
       the spin so the globe holds still and the Sun sweeps -> real day/night. */
    const ldir = locationDir(CFG.userLat, CFG.userLon, gm);
    camera.position.set(ldir[0]*camDist, ldir[1]*camDist, ldir[2]*camDist);
    setFromArr(camera.up, eclNorthArr(n));
    camera.lookAt(0,0,0);
    camera.rotateZ(CFG.lockedRoll * D2R);   // turn the map upright
  } else {
    /* Full: fixed in the ecliptic plane, offset from the Sun so shadowFrac of the
       disk is dark (terminator on the left), ecliptic north up. */
    const alpha = Math.acos(1 - 2*CFG.shadowFrac) * R2D;
    const cd = eclToArr(s.lam - alpha, 0, n);
    camera.position.set(cd[0]*camDist, cd[1]*camDist, cd[2]*camDist);
    setFromArr(camera.up, eclNorthArr(n));
    camera.lookAt(0,0,0);
  }
}

function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
animate();

/* keep it a wallpaper: no interaction at all */
for(const ev of ['contextmenu','wheel','touchmove','dblclick','selectstart'])
  window.addEventListener(ev, e=>e.preventDefault(), { passive:false });
</script>
</body>
