const scene = new THREE.Scene();

/* ---------- living sky background ---------- */
const skyUniforms = {
  uRes    : { value: new THREE.Vector2(1,1) },
  uWob    : { value: 0 },
  uSunEl  : { value: 30 },
  uSunPos : { value: new THREE.Vector2(0.5,0.3) },
  uMoonPos: { value: new THREE.Vector2(0.62,0.6) }

const skyMat = new THREE.ShaderMaterial({
  uniforms: skyUniforms, depthWrite: false,
  vertexShader: 'void main(){ gl_Position = vec4(position.xy, 0.9999, 1.0); }',
  fragmentShader: `
precision highp float;
uniform vec2 uRes; uniform float uWob;
uniform float uSunEl; uniform vec2 uSunPos; uniform vec2 uMoonPos;
float hash21(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
vec3 aces(vec3 x){ return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0); }
void main(){
  vec2 f2 = gl_FragCoord.xy / uRes;
  vec2 uv = vec2(f2.x * uRes.x/uRes.y, f2.y);
  float el = uSunEl;
  float dayF  = smoothstep(-8.0, 10.0, el);
  float glowF = exp(-abs(el)/9.0) * clamp((el + 9.0)/8.0, 0.0, 1.0);
  vec3 dayZen  = vec3(0.07, 0.30, 0.84);
  vec3 dayHor  = vec3(0.42, 0.66, 0.93);
  vec3 nightZen= vec3(0.004, 0.007, 0.022);
  vec3 nightHor= vec3(0.012, 0.020, 0.050);
  float h = pow(clamp(f2.y, 0.0, 1.0), 0.80);
  vec3 sky = mix( mix(nightHor, nightZen, h), mix(dayHor, dayZen, h), dayF );
  vec3 warm = vec3(1.0, 0.535, 0.275);
  sky += warm * glowF * pow(1.0 - h, 2.5) * 0.55;
  vec2 sunP = vec2(uSunPos.x * uRes.x/uRes.y, uSunPos.y);
  float sd = length(uv - sunP);
  if(el > -6.0){
    vec3 sunCol = mix(vec3(1.0,0.55,0.25), vec3(1.0,0.97,0.88), smoothstep(0.0, 25.0, el));
    sky += sunCol * 0.05 * exp(-sd*2.2);
  }
  float starF = smoothstep(-4.0, -12.0, el);
  if(starF > 0.0){
    vec2 g = uv * 190.0;
    vec2 id = floor(g), ff = fract(g);
    float hh = hash21(id);
    if(hh > 0.90){
      vec2 sp = vec2(hash21(id+3.1), hash21(id+7.7))*0.7 + 0.15;
      float dst = length(ff - sp);
      float m = (hh-0.90)/0.10;
      float tw = 0.8 + 0.2*sin(uWob*45.0 + hh*90.0);
      sky += vec3(0.9,0.93,1.0) * m*m * smoothstep(0.09, 0.0, dst) * starF * 0.9 * tw;
    }
  }
  float moonF = smoothstep(-2.0, -10.0, el);
  if(moonF > 0.0){
    vec2 moonP = vec2(uMoonPos.x * uRes.x/uRes.y, uMoonPos.y);
    float md = length(uv - moonP);
    sky += vec3(0.95,0.96,1.00) * smoothstep(0.032, 0.026, md) * 1.1 * moonF;
    sky += vec3(0.55,0.62,0.85) * 0.18 * exp(-md*md*40.0) * moonF;
    sky += vec3(0.35,0.42,0.65) * 0.05 * exp(-md*2.5) * moonF;
  }
  vec2 c2 = f2 - 0.5;
  sky *= 1.0 - dot(c2,c2)*0.30;
  sky = aces(sky);
  sky = pow(sky, vec3(1.0/2.2));
  gl_FragColor = vec4(sky, 1.0);
}`
});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), skyMat));

/* ---------- volumetric cloud sprites, two parallax bands ---------- */
const loader = new THREE.TextureLoader();
const clouds = [];
/* deterministic layout so the sky looks the same on every device */
function mulberry(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const rnd = mulberry(1234);
const N_CLOUDS = 11;
for(let i=0;i<N_CLOUDS;i++){
  const tex = loader.load(SPRITES[i % SPRITES.length]);
  tex.minFilter = THREE.LinearFilter;
  const near = i % 2 === 0;                       /* alternate bands */
  const asp = 0.45 + rnd()*0.12;                  /* sprite h/w ~ */
  const w = near ? (0.85 + rnd()*0.55) : (0.45 + rnd()*0.30);
  const geo = new THREE.PlaneGeometry(w, w*asp);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false });
  const m = new THREE.Mesh(geo, mat);
  if(rnd() > 0.5) m.scale.x = -1;                 /* mirrored variety */
  m.position.z = near ? 0.5 : 0.2;
  m.userData = {
    band  : near ? 1.0 : 0.5,                     /* parallax speed factor */
    y     : near ? (-0.55 + rnd()*0.9) : (0.0 + rnd()*0.75),
    phase : rnd(),                                /* spread along the loop */
    op    : near ? 0.98 : 0.9
  };
  m.position.y = m.userData.y;
  clouds.push(m);
  scene.add(m);
}

function layout(){
  const w = window.innerWidth, h = window.innerHeight;
  const pr = Math.min(window.devicePixelRatio||1, CFG.maxDPR) * CFG.renderScale;
  renderer.setSize(Math.round(w*pr), Math.round(h*pr), false);
  renderer.domElement.style.width  = w+'px';
  renderer.domElement.style.height = h+'px';
  skyUniforms.uRes.value.set(Math.round(w*pr), Math.round(h*pr));
  A = w/h;
  camera.left = -A; camera.right = A;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', layout);
layout();

/* ---------- real sun & moon from the wall clock ---------- */
const D2R = Math.PI/180;
function sunNow(){
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const N = Math.floor((now - start) / 86400000);
  const LT = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  const dec = -23.44 * Math.cos(2*Math.PI*(N + 10)/365) * D2R;
  const H = (LT - 12) * 15 * D2R;
  const phi = CFG.latitude * D2R;
  const el = Math.asin(Math.sin(phi)*Math.sin(dec) + Math.cos(phi)*Math.cos(dec)*Math.cos(H)) / D2R;
  const x = 0.5 + Math.sin(H) * 0.42;
  const y = Math.min(Math.max(0.16 + Math.max(el, -8)/90 * 0.55, 0.05), 0.72);
  const mx = 0.5 - Math.sin(H) * 0.30;
  const my = 0.62 + Math.cos(H) * 0.10;
  return { el, x, y, mx, my };
}

const dayTint   = { r:1.00, g:1.00, b:1.00 };
const duskTint  = { r:1.00, g:0.72, b:0.58 };
const nightTint = { r:0.085,g:0.105,b:0.175 };

function animate(){
  requestAnimationFrame(animate);
  const s = sunNow();
  skyUniforms.uSunEl.value = s.el;
  skyUniforms.uSunPos.value.set(s.x, s.y);
  skyUniforms.uMoonPos.value.set(s.mx, s.my);
  const t = Date.now() / 1000;
  skyUniforms.uWob.value = (t % 86400) * 0.002;

  /* cloud tint follows the sky */
  const dayF  = Math.min(Math.max((s.el + 8)/18, 0), 1);
  const glowF = Math.exp(-Math.abs(s.el)/9) * Math.min(Math.max((s.el + 9)/8, 0), 1);
  let r = nightTint.r + (dayTint.r - nightTint.r)*dayF;
  let g = nightTint.g + (dayTint.g - nightTint.g)*dayF;
  let b = nightTint.b + (dayTint.b - nightTint.b)*dayF;
  r = r*(1-glowF*0.55) + duskTint.r*glowF*0.55;
  g = g*(1-glowF*0.55) + duskTint.g*glowF*0.55;
  b = b*(1-glowF*0.55) + duskTint.b*glowF*0.55;

  /* real drift: near band crosses the 2A-wide view in screenCross seconds */
  const span = 2*A + 2.2;                 /* travel span incl. off-screen margin */
  for(const m of clouds){
    const ud = m.userData;
    const speed = (2*A / CFG.screenCross) * ud.band;
    const x = ((ud.phase*span + t*speed) % span);
    m.position.x = x - span/2;
    m.material.color.setRGB(r, g, b);
    m.material.opacity = ud.op * (0.85 + 0.15*dayF);
  }
  renderer.render(scene, camera);
}
animate();

/* keep it a wallpaper: no interaction at all */
for(const ev of ['contextmenu','wheel','touchmove','dblclick','selectstart'])
  window.addEventListener(ev, e=>e.preventDefault(), { passive:false });
</script>
