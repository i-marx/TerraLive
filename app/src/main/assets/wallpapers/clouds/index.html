<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Drifting Clouds — Live</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}
  canvas{display:block;width:100vw !important;height:100vh !important}
  *{user-select:none;-webkit-user-select:none;touch-action:none;cursor:default}
  #err{position:fixed;inset:0;display:none;color:#889;font:14px system-ui;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="err">WebGL is not available on this device.</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* ============================================================
   DRIFTING CLOUDS — calm 24-hour sky wallpaper
   - Clouds drift at REAL average speed: fair-weather cumulus at
     ~1.5 km altitude moving ~40 km/h crosses a ground observer's
     field of view in about 4 minutes. Far layers move slower
     (true parallax). Drift phase comes from the wall clock, so
     the sky keeps moving even while the wallpaper is paused.
   - Day/night follows the real Sun: solar elevation computed
     from your device clock and date (declination + hour angle),
     so dawn, gold, blue and night arrive when they really do,
     shifting naturally with the seasons.
   ============================================================ */

const CFG = {
  latitude    : 54.7,     // used for the sun's height (default: Lithuania)
  screenCross : 240,      // seconds for a near cloud to cross the screen (real-speed)
  renderScale : 1.0,
  maxDPR      : 2.0,
  cover       : 0.56      // cloudiness 0.45 (busy sky) .. 0.65 (few clouds)
};

let renderer;
try{
  renderer = new THREE.WebGLRenderer({ antialias:false, alpha:false, powerPreference:'low-power' });
}catch(e){ document.getElementById('err').style.display='flex'; throw e; }
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const uniforms = {
  uRes   : { value: new THREE.Vector2(1,1) },
  uOffs  : { value: new THREE.Vector3(0,0,0) },   // per-layer drift offsets (computed in JS doubles)
  uWob   : { value: 0 },                          // slow shape evolution
  uSunEl : { value: 30 },                         // solar elevation, degrees
  uSunPos: { value: new THREE.Vector2(0.5,0.3) }, // screen position of the sun
  uMoonPos:{ value: new THREE.Vector2(0.7,0.25) },
  uCover : { value: CFG.cover }
};

const frag = `
precision highp float;
uniform vec2 uRes; uniform vec3 uOffs; uniform float uWob;
uniform float uSunEl; uniform vec2 uSunPos; uniform vec2 uMoonPos;
uniform float uCover;

float hash21(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  float a = hash21(i), b = hash21(i+vec2(1,0)), c = hash21(i+vec2(0,1)), d = hash21(i+vec2(1,1));
  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
}
float fbm(vec2 p){
  float v = 0.0, a = 0.5;
  for(int i=0;i<5;i++){ v += a*vnoise(p); p = p*2.13 + vec2(19.7, 7.3); a *= 0.52; }
  return v;
}
vec3 aces(vec3 x){ return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0); }

/* fluffy cumulus layer: domain-warped fbm with soft coverage threshold */
float cloud(vec2 uv, float scale, float off, float cover, float wob){
  vec2 p = (uv + vec2(off, 0.0)) * scale;
  vec2 w = vec2(fbm(p*0.7 + wob), fbm(p*0.8 + 37.0 - wob));
  float d = fbm(p + (w - 0.5)*1.1);
  /* puffier tops, flatter bases */
  d += 0.14 * fbm(p*3.1 + w*2.0);
  return smoothstep(cover, cover + 0.14, d);
}

void main(){
  vec2 frag2 = gl_FragCoord.xy / uRes;
  vec2 uv = vec2(frag2.x * uRes.x/uRes.y, frag2.y);   /* aspect-true x, y: 0 bottom .. 1 top */
  float el = uSunEl;

  /* ---------- sky gradient through the whole day ---------- */
  float dayF   = smoothstep(-8.0, 10.0, el);                 /* night -> day */
  float glowF  = exp(-abs(el)/9.0) * clamp((el + 9.0)/8.0, 0.0, 1.0);  /* dawn/dusk only */
  /* deep summer blue overhead, bright airy horizon */
  vec3 dayZen  = vec3(0.10, 0.35, 0.86);
  vec3 dayHor  = vec3(0.55, 0.76, 0.95);
  vec3 nightZen= vec3(0.012, 0.020, 0.055);
  vec3 nightHor= vec3(0.035, 0.055, 0.110);
  float h = pow(clamp(frag2.y, 0.0, 1.0), 0.65);
  vec3 sky = mix( mix(nightHor, nightZen, h), mix(dayHor, dayZen, h), dayF );
  /* warm band hugging the horizon at sunrise/sunset */
  vec3 warm = mix(vec3(1.00,0.45,0.25), vec3(1.00,0.62,0.30), 0.5);
  sky += warm * glowF * pow(1.0 - h, 2.5) * 0.55;
  sky += vec3(0.55,0.35,0.45) * glowF * pow(1.0 - h, 1.2) * 0.12;

  /* ---------- stars (fade in when the sun is well below horizon) ---------- */
  float starF = smoothstep(-4.0, -12.0, el);
  if(starF > 0.0){
    vec2 g = uv * 160.0;
    vec2 id = floor(g), f2 = fract(g);
    float hh = hash21(id);
    if(hh > 0.93){
      vec2 sp = vec2(hash21(id+3.1), hash21(id+7.7))*0.7 + 0.15;
      float dst = length(f2 - sp);
      float tw = 0.75 + 0.25*sin(uWob*40.0 + hh*80.0);
      sky += vec3(0.9,0.93,1.0) * smoothstep(0.10, 0.0, dst) * (hh-0.93)/0.07 * starF * 0.8 * tw;
    }
  }

  /* ---------- sun ---------- */
  vec2 sunP = vec2(uSunPos.x * uRes.x/uRes.y, uSunPos.y);
  float sd = length(uv - sunP);
  if(el > -6.0){
    vec3 sunCol = mix(vec3(1.0,0.55,0.25), vec3(1.0,0.97,0.88), smoothstep(0.0, 25.0, el));
    sky += sunCol * smoothstep(0.035, 0.028, sd) * 1.2 * smoothstep(-6.0, 0.0, el);
    sky += sunCol * 0.22 * exp(-sd*sd*60.0);
    sky += sunCol * 0.04 * exp(-sd*3.0);
  }

  /* ---------- moon (soft, at night) ---------- */
  float moonF = smoothstep(-2.0, -10.0, el);
  if(moonF > 0.0){
    vec2 moonP = vec2(uMoonPos.x * uRes.x/uRes.y, uMoonPos.y);
    float md = length(uv - moonP);
    sky += vec3(0.92,0.94,1.0) * smoothstep(0.030, 0.024, md) * 0.85 * moonF;
    sky += vec3(0.70,0.78,1.0) * 0.10 * exp(-md*md*60.0) * moonF;
  }

  /* ---------- three drifting cloud layers, back to front ---------- */
  vec3 col = sky;
  for(int i=0;i<3;i++){
    float scale, off, op, ymin, ymax;
    if(i==0){ scale=3.4; off=uOffs.x; op=0.55; ymin=0.45; ymax=1.05; }      /* far, high */
    else if(i==1){ scale=2.3; off=uOffs.y; op=0.75; ymin=0.25; ymax=0.95; } /* middle */
    else { scale=1.5; off=uOffs.z; op=0.92; ymin=0.02; ymax=0.85; }         /* near, low */
    /* keep each layer in its own sky band for depth */
    float band = smoothstep(ymin, ymin+0.18, frag2.y) * (1.0 - smoothstep(ymax-0.15, ymax, frag2.y));
    if(band <= 0.001) continue;
    float d = cloud(uv, scale, off, uCover, uWob) * band;
    if(d <= 0.001) continue;
    /* lighting: bright sunlit tops by day, moonlit slate by night, blushed at golden hour */
    float dUp = cloud(uv + vec2(0.0, 0.035), scale, off, uCover, uWob) * band;
    float topLight = clamp(1.0 - dUp*0.9, 0.25, 1.0);       /* thinner above = lit top */
    vec3 dayCloud   = mix(vec3(0.58,0.66,0.80), vec3(1.02,1.01,0.99), topLight);
    vec3 nightCloud = mix(vec3(0.030,0.042,0.075), vec3(0.10,0.13,0.20), topLight);
    vec3 cCol = mix(nightCloud, dayCloud, dayF);
    /* golden-hour blush, strongest on the sun side */
    float sunSide = exp(-length(uv - sunP)*1.2);
    cCol += vec3(1.0,0.45,0.28) * glowF * (0.35 + 0.45*sunSide) * topLight;
    col = mix(col, cCol, d * op * (0.55 + 0.45*dayF));
  }

  /* gentle vignette, calm finish */
  vec2 c2 = frag2 - 0.5;
  col *= 1.0 - dot(c2,c2)*0.35;
  col = aces(col);
  col = pow(col, vec3(1.0/2.2));
  gl_FragColor = vec4(col, 1.0);
}`;

const mat = new THREE.ShaderMaterial({
  uniforms,
  vertexShader: 'void main(){ gl_Position = vec4(position, 1.0); }',
  fragmentShader: frag
});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat));

function layout(){
  const w = window.innerWidth, h = window.innerHeight;
  const pr = Math.min(window.devicePixelRatio||1, CFG.maxDPR) * CFG.renderScale;
  renderer.setSize(Math.round(w*pr), Math.round(h*pr), false);
  renderer.domElement.style.width  = w+'px';
  renderer.domElement.style.height = h+'px';
  uniforms.uRes.value.set(Math.round(w*pr), Math.round(h*pr));
}
window.addEventListener('resize', layout);
layout();

/* ---------- real sun from the wall clock ---------- */
const D2R = Math.PI/180;
function sunNow(){
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const N = Math.floor((now - start) / 86400000);
  const LT = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  const dec = -23.44 * Math.cos(2*Math.PI*(N + 10)/365) * D2R;
  const H = (LT - 12) * 15 * D2R;                 /* hour angle */
  const phi = CFG.latitude * D2R;
  const el = Math.asin(Math.sin(phi)*Math.sin(dec) + Math.cos(phi)*Math.cos(dec)*Math.cos(H)) / D2R;
  /* screen path: rises on the left, sets on the right */
  const x = 0.5 + Math.sin(H) * 0.42;
  const y = 0.16 + Math.max(el, -8) / 90 * 0.55;  /* horizon ~0.16 .. high sun ~0.7 */
  /* a simple serene moon opposite the sun */
  const mx = 0.5 - Math.sin(H) * 0.38;
  const my = 0.55 + Math.cos(H) * 0.15;
  return { el, x, y: Math.min(Math.max(y, 0.05), 0.72), mx, my };
}

/* ---------- real drift speed ----------
   near layer crosses the screen in CFG.screenCross seconds (≈ real
   cumulus pace); farther layers at 60% / 35% (parallax).
   Offsets are computed in JS doubles and wrapped, so there is no
   float drift jitter and no midnight jump. */
const SPD = [0.35, 0.60, 1.00].map(k => k / CFG.screenCross);
function drift(){
  const t = Date.now() / 1000;
  const wrap = 2048;
  uniforms.uOffs.value.set(
    (t * SPD[0]) % wrap,
    (t * SPD[1]) % wrap,
    (t * SPD[2]) % wrap
  );
  uniforms.uWob.value = (t % 86400) * 0.002;      /* very slow shape evolution */
}

function animate(){
  requestAnimationFrame(animate);
  const s = sunNow();
  uniforms.uSunEl.value = s.el;
  uniforms.uSunPos.value.set(s.x, s.y);
  uniforms.uMoonPos.value.set(s.mx, s.my);
  drift();
  renderer.render(scene, camera);
}
animate();

/* keep it a wallpaper: no interaction at all */
for(const ev of ['contextmenu','wheel','touchmove','dblclick','selectstart'])
  window.addEventListener(ev, e=>e.preventDefault(), { passive:false });
</script>
</body>
</html>
