name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Restore signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        if: env.KEYSTORE_B64 != ''
        run: echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/terra-upload.jks"

      - name: Build debug APK (sideload on your phone)
        run: gradle :app:assembleDebug

      - name: Build release bundle + APK (signed for Google Play)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          TERRA_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          TERRA_KEY_ALIAS: terra
        run: |
          if [ -n "$KEYSTORE_B64" ]; then export TERRA_KEYSTORE="$RUNNER_TEMP/terra-upload.jks"; fi
          gradle :app:bundleRelease :app:assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TerraLive-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Play bundle
        uses: actions/upload-artifact@v4
        with:
          name: TerraLive-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: TerraLive-release-apk
          path: app/build/outputs/apk/release/app-release.apk
